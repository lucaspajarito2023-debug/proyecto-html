<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>axis</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="header">
        <div class="hm1__title">
            <img src="./img/LOGO.png" alt="logo">
        </div>
        <div class="hm-container">
                <ul class="hm1-container__menu">
                    <li class="menu__list"><a href=""><img src="./img/original.png" alt=""></a></li>
                    <li class="menu__list"><a href="./catalogo.html" class="menu__link">Productos</a></li>
                    <li class="menu__list"><a href="#" class="menu__link">Historial</a></li>
                    <li class="menu__list"><a href="#" class="menu__link">Perfil</a></li>
                    <li class="menu__list"><a href="#" class="menu__link">Cerrar sesión</a></li>
                </ul>
        </div>
    </header>
    <hr>
    <main class="buscar">
        <form action="search">
            <input type="text" name="query" placeholder="Buscar...">
            <button type="submit" style=" background: linear-gradient(to right, rgb(252, 251, 248), rgb(218, 218, 240));">Buscar</button>
        </form>
    </main>
    <main class="categorias-visuales">
        <h2>Categorías</h2>
        <p>Ofrecemos diversos productos para que te vistas como todo un profesional. <br><b>¡Que esperas a transmitir tu potencial!</b></p>
        <div class="categorias">
            <div class="categoria">
              <a href=""><img src="./img/ropa.jpg" alt="Categoría 1"><a>  
                <p>Ropa</p> 
            </div>
            <div class="categoria">
                <img src="./img/cosmeticos.jpeg" alt="Categoría 2">
                <p>Cosmeticos</p>
            </div>
            <div class="categoria">
                <img src="./img/calzado.jpeg" alt="Categoría 3">
                <p>Calzado</p>
            </div>
        </div>
    </main>
<main class="productosmas-vendidos">
    <h2>Productos más vendidos</h2>
    <div class="productos">
        <div class="producto">
            <img src="./img/ropa.jpg" alt="Producto 1">
            <p>Producto 1</p>
        </div>
        <div class="producto">
            <img src="./img/cosmeticos.jpeg" alt="Producto 2">
            <p>Producto 2</p>
        </div>
        <div class="producto">
            <img src="./img/calzado.jpeg" alt="Producto 3">
            <p>Producto 3</p>
        </div>
    </div>
</main>
