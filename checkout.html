<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="./styleckeckout.css">
</head>
<body>
    <header class="header">
        <nav class="volver"> 
            <a href="./index.html" class="link"><img src="./img/volver.png" alt=""></a>
        </nav>
        <div class="title-carrito"><h3>Checkout</h3></div>
    </header>
    <h2 class="envio">Detalles de Envío</h2>
    <main class="form">
        <form action="send" method="POST">
            <div class="input-group">
                <label for="name">Nombre Completo</label>
                <input type="text" id="name" name="name" required placeholder="Nombres y apellidos">
            </div>
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder=" Tu correo electrónico">
            </div>
            <div class="input-group">
                <label for="address">Dirección de Envío</label>
                <input type="text" id="address" name="address" required placeholder=" Tu dirección">
            </div>
        </form>
    </main>
    <h3 class="metod pay">Método de Pago</h3>
    <main>
        <div class="card">
            <img src="./img/visa.png" alt="Visa">
            <p>Visa</p>
        </div>
        <div class="card">
            <img src="./img/mastercard.png" alt="Mastercard">
            <p>Mastercard</p>
        </div>
        <div class="card">
            <img src="./img/paypal.png" alt="PayPal">
            <p>PayPal</p>
        </div>
    </main>
    <h4>Resumen del Pedido</h4>
    <main class="resumen-pedido">
        <div class="producto">
            <a href="./producto1.html">
                <img src="./img/camisa.png" alt="Producto 1">
            <p>Producto 1 - $10.00</p> 
            </a> 
        </div>
        <div class="producto">
            <a href="./producto2.html">
                <img src="./img/camisa2.png" alt="Producto 2">
                <p>Producto 2 - $20.00</p>
            </a>
        </div>
        <div class="producto">
            <a href="./producto3.html">
                <img src="./img/calzado2.png" alt="Producto 3">
                <p>Producto 3 - $30.00</p>
            </a>
        </div>
    </main>
    <form>
        <main class="button">
            <button type="reset" class="mi-boton" ><a href="./mensaje.html">Realizar Pedido</a></button>
    </main>
    </form>
</body>
</html>
